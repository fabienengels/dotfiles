[config]
version_check = false

[templates.ghostty]
input_path = "~/.config/matugen/templates/ghostty"
output_path = "~/.config/ghostty/themes/matugen"
post_hook = "pkill -SIGUSR2 ghostty"

[templates.niri]
input_path = "~/.config/matugen/templates/niri.kdl"
output_path = "~/.config/niri/colors.kdl"

[templates.rmpc]
input_path = "~/.config/matugen/templates/rmpc.ron"
output_path = "~/.config/rmpc/themes/matugen.ron"

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar.css"
output_path = "~/.config/waybar/colors.css"

[templates.zellij]
input_path = "~/.config/matugen/templates/zellij.kdl"
output_path = "~/.config/zellij/themes/matugen.kdl"
post_hook = "touch ~/.config/zellij/config.kdl"
